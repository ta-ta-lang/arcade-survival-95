<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dave & Buster's: Arcade Survival 2D</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="game-container">
    <!-- Top HUD Bar -->
    <header id="hud-bar">
      <div class="hud-item">DAY: <span id="hud-day">1</span>/365</div>
      <div class="hud-item">TOKENS: <span id="hud-tokens">1000</span></div>
      <div class="hud-item">CREDITS: <span id="hud-credits">0</span></div>
      <div class="hud-item">TIME DILATION: <span id="hud-time">OFF</span></div>
    </header>

    <!-- Main Game Canvas Area -->
    <div id="canvas-wrapper">
      <canvas id="gameCanvas" width="800" height="600"></canvas>
      
      <!-- Dialogue & Action Overlay Window -->
      <div id="dialogue-box" class="hidden">
        <div id="dialogue-title">SYSTEM</div>
        <div id="dialogue-text">...</div>
        <div id="dialogue-options"></div>
      </div>

      <!-- Playable Minigame Canvas Overlay -->
      <div id="minigame-overlay" class="hidden">
        <div id="minigame-header">
          <span id="minigame-title">ARCADE CABINET</span>
          <button id="minigame-close">X (ESC)</button>
        </div>
        <canvas id="minigameCanvas" width="600" height="400"></canvas>
        <div id="minigame-controls-hint">Use Arrow Keys / Spacebar to Play</div>
      </div>
    </div>

    <!-- On-screen Movement Controls / Instructions -->
    <footer id="footer-controls">
      <span><strong>WASD / Arrow Keys</strong>: Move Character</span>
      <span><strong>E / Space</strong>: Interact with Objects</span>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
