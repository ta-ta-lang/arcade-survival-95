<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCADE SURVIVAL '95 - Fullscreen Edition</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html {
            width: 100%;
            height: 100%;
            background-color: #050508;
            color: #00ffcc;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }
        canvas {
            width: 100vw;
            height: 100vh;
            object-fit: contain; /* Fills screen cleanly without stretching aspect ratio */
            image-rendering: -moz-crisp-edges;
            image-rendering: -webkit-crisp-edges;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            display: block;
        }
        #crt-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 4px;
            pointer-events: none;
        }
        #top-bar {
            position: absolute;
            top: 15px;
            left: 20px;
            pointer-events: none;
            z-index: 10;
        }
        #top-bar h1 {
            color: #ff0055;
            text-shadow: 0 0 10px #ff0055, 2px 2px #00ffcc;
            font-size: 26px;
            letter-spacing: 2px;
        }
        #top-bar p {
            color: #8a8aab;
            font-size: 12px;
            margin-top: 4px;
        }
        #ui-overlay {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: rgba(10, 10, 18, 0.95);
            border-top: 3px solid #00ffcc;
            padding: 15px 25px;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 -5px 25px rgba(0, 255, 204, 0.2);
            z-index: 10;
        }
        #leaderboard {
            position: absolute;
            top: 15px; right: 20px;
            background: rgba(12, 12, 20, 0.92);
            border: 2px solid #ff0055;
            box-shadow: 0 0 12px rgba(255, 0, 85, 0.4);
            padding: 12px;
            font-size: 12px;
            color: #fff;
            width: 210px;
            border-radius: 4px;
            z-index: 10;
        }
        .stat-val { color: #fff; font-weight: bold; }
    </style>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body>

<div id="game-container">
    <div id="top-bar">
        <h1>ARCADE SURVIVAL '95</h1>
        <p>[A / D] Move &nbsp;|&nbsp; [E] Interact &nbsp;|&nbsp; [SHIFT] Run</p>
    </div>

    <canvas id="gameCanvas" width="960" height="480"></canvas>
    <div id="crt-overlay"></div>
    
    <div id="leaderboard">
        <b style="color: #ff0055; display:block; border-bottom: 1px solid #333; padding-bottom: 4px; margin-bottom: 6px;">🏆 TOP SURVIVORS</b>
        <ol id="leaderboard-list" style="margin: 0; padding-left: 18px; color: #00ffcc;"></ol>
    </div>

    <div id="ui-overlay">
        <div>
            DAY: <span class="stat-val" id="day-val">1</span> &nbsp;|&nbsp; 
            TOKENS: <span class="stat-val" id="token-val" style="color:#00ffcc">1000</span> &nbsp;|&nbsp; 
            CREDITS: <span class="stat-val" id="credit-val" style="color:#ff0055">0</span>
        </div>
        <div id="status-msg" style="color: #ffff00; font-weight: bold;">Approach N40M1's desk or play cabinets...</div>
    </div>
</div>

<script>
// --- 1. FIREBASE SETUP ---
const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
    projectId: "YOUR_PROJECT",
    storageBucket: "YOUR_PROJECT.appspot.com",
    messagingSenderId: "SENDER_ID",
    appId: "APP_ID"
};

let db = null;
try {
    firebase.initializeApp(firebaseConfig);
    db = firebase.database();
} catch (e) {
    console.warn("Firebase running in offline mode.");
}

let username = localStorage.getItem('arcade_user') || "Player_" + Math.floor(1000 + Math.random() * 9000);
localStorage.setItem('arcade_user', username);

// --- 2. CANVAS ENGINE ---
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

let state = {
    day: 1,
    tokens: 1000,
    credits: 0,
    playerX: 80,
    playerY: 330,
    facing: 'right',
    isMoving: false,
    animFrame: 0,
    message: `Welcome to the Arcade, ${username}!`
};

const keys = {};
window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);

// Objects & N40M1 Shop Location
const objects = [
    { name: "NEO DRIFT '92", x: 120, color: "#ff0055", screenColor: "#0055ff", cost: 10, type: "game" },
    { name: "CYBER SLAM", x: 260, color: "#00ffcc", screenColor: "#ffaa00", cost: 15, type: "game" },
    { name: "SPACE RAID", x: 400, color: "#aa00ff", screenColor: "#00ff55", cost: 20, type: "game" },
    { name: "N40M1 SHOP", x: 580, color: "#ffaa00", cost: 0, type: "shop" },
    { name: "EXIT DOOR", x: 820, color: "#222233", cost: 0, type: "secret" }
];

// --- 3. GRAPHICS DRAWING ENGINE ---

function drawEnvironment() {
    // Wall Background
    let wallGrad = ctx.createLinearGradient(0, 0, 0, 310);
    wallGrad.addColorStop(0, '#090812');
    wallGrad.addColorStop(1, '#18142a');
    ctx.fillStyle = wallGrad;
    ctx.fillRect(0, 0, canvas.width, 310);

    // Neon Wall Stripes
    ctx.fillStyle = '#ff0055'; ctx.fillRect(0, 90, canvas.width, 4);
    ctx.fillStyle = '#00ffcc'; ctx.fillRect(0, 98, canvas.width, 2);

    // Floor Background
    ctx.fillStyle = '#0f0c1b';
    ctx.fillRect(0, 310, canvas.width, 170);

    // Perspective Floor Grid Lines
    ctx.strokeStyle = '#231b3e';
    ctx.lineWidth = 2;
    for (let x = 0; x < canvas.width; x += 50) {
        ctx.beginPath();
        ctx.moveTo(x, 310);
        ctx.lineTo(x, 480);
        ctx.stroke();
    }
    for (let y = 310; y < 480; y += 30) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
        ctx.stroke();
    }
}

function drawCabinet(cab) {
    const x = cab.x;
    const y = 160;

    // Outer Frame & Body
    ctx.fillStyle = '#0a0a10'; ctx.fillRect(x - 2, y - 2, 64, 154);
    ctx.fillStyle = cab.color; ctx.fillRect(x, y, 60, 150);
    ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.fillRect(x + 52, y, 8, 150);

    // Glowing Header
    ctx.fillStyle = '#111'; ctx.fillRect(x + 4, y + 6, 52, 22);
    ctx.fillStyle = cab.color; ctx.fillRect(x + 6, y + 8, 48, 18);
    ctx.fillStyle = '#ffffff'; ctx.font = 'bold 8px Courier New';
    ctx.fillText(cab.name.substring(0, 9), x + 8, y + 20);

    // Screen Display
    ctx.fillStyle = '#05050a'; ctx.fillRect(x + 5, y + 34, 50, 45);
    ctx.fillStyle = cab.screenColor; ctx.fillRect(x + 8, y + 37, 44, 39);

    // Screen Arc Glass Shine
    ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
    ctx.beginPath();
    ctx.moveTo(x + 8, y + 37);
    ctx.lineTo(x + 35, y + 37);
    ctx.lineTo(x + 8, y + 65);
    ctx.fill();

    // Controls & Coin Door
    ctx.fillStyle = '#22222e'; ctx.fillRect(x + 2, y + 82, 56, 22);
    ctx.fillStyle = '#ff0000'; ctx.beginPath(); ctx.arc(x + 13.5, y + 91, 3, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#00ffcc'; ctx.beginPath(); ctx.arc(x + 28, y + 93, 2.5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#ff0055'; ctx.beginPath(); ctx.arc(x + 36, y + 93, 2.5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#15151f'; ctx.fillRect(x + 10, y + 108, 40, 38);
}

function drawNaomiNPC(shop) {
    const x = shop.x;
    const y = 170;

    // 1. Prize Shelves Behind Naomi
    ctx.fillStyle = '#120c24'; ctx.fillRect(x - 20, y - 40, 100, 75);
    ctx.strokeStyle = '#ff0055'; ctx.lineWidth = 2; ctx.strokeRect(x - 20, y - 40, 100, 75);

    // Prizes on Shelf
    ctx.fillStyle = '#ffff00'; ctx.fillRect(x - 10, y - 30, 14, 14); // Plushie / Box
    ctx.fillStyle = '#00ffcc'; ctx.fillRect(x + 15, y - 35, 18, 18);
    ctx.fillStyle = '#ff007f'; ctx.fillRect(x + 45, y - 28, 12, 12);

    // 2. NAOMI CHARACTER SPRITE
    // Neon Hair
    ctx.fillStyle = '#ff007f';
    ctx.fillRect(x + 16, y + 15, 28, 30);
    // Face
    ctx.fillStyle = '#fce2c4';
    ctx.fillRect(x + 20, y + 22, 20, 20);
    // Cyber Visor / Eyes
    ctx.fillStyle = '#00ffcc';
    ctx.fillRect(x + 22, y + 27, 16, 4);
    // Jacket Body
    ctx.fillStyle = '#1a0d2e';
    ctx.fillRect(x + 16, y + 42, 28, 30);

    // 3. Shop Glass Counter
    ctx.fillStyle = 'rgba(10, 200, 255, 0.2)';
    ctx.fillRect(x - 25, y + 55, 110, 55);
    ctx.strokeStyle = '#00ffcc';
    ctx.lineWidth = 2;
    ctx.strokeRect(x - 25, y + 55, 110, 55);

    // Counter Neon Banner
    ctx.fillStyle = '#090912'; ctx.fillRect(x - 20, y + 70, 100, 25);
    ctx.fillStyle = '#ff0055'; ctx.font = 'bold 11px Courier New';
    ctx.fillText("N40M1'S SHOP", x - 10, y + 86);
}

function drawDetailedPlayer() {
    const x = state.playerX;
    const y = state.playerY;
    const bounce = state.isMoving ? Math.sin(state.animFrame * 0.3) * 2.5 : 0;

    // Shadow
    ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
    ctx.beginPath();
    ctx.ellipse(x + 14, y + 50, 14, 5, 0, 0, Math.PI * 2);
    ctx.fill();

    // Legs & Shoes
    ctx.fillStyle = '#1b1b2d';
    ctx.fillRect(x + 5, y + 30 + bounce, 7, 18);
    ctx.fillRect(x + 16, y + 30 + bounce, 7, 18);
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(x + 3, y + 46 + bounce, 9, 5);
    ctx.fillRect(x + 16, y + 46 + bounce, 9, 5);

    // Jacket & Shirt
    ctx.fillStyle = '#00ffcc'; ctx.fillRect(x + 4, y + 14 + bounce, 20, 18);
    ctx.fillStyle = '#ff0055'; ctx.fillRect(x + 11, y + 14 + bounce, 6, 18);

    // Face & Eyes
    ctx.fillStyle = '#ffccaa'; ctx.fillRect(x + 6, y - 2 + bounce, 16, 16);
    ctx.fillStyle = '#111';
    if (state.facing === 'right') {
        ctx.fillRect(x + 16, y + 3 + bounce, 3, 4);
    } else {
        ctx.fillRect(x + 8, y + 3 + bounce, 3, 4);
    }

    // Hair
    ctx.fillStyle = '#4a2e18';
    ctx.fillRect(x + 5, y - 6 + bounce, 18, 6);
    ctx.fillRect(x + 4, y - 2 + bounce, 4, 7);
}

// --- 4. GAME UPDATE LOOP ---

function update() {
    let speed = keys['ShiftLeft'] || keys['ShiftRight'] ? 4.5 : 2.5;
    state.isMoving = false;

    if (keys['ArrowRight'] || keys['KeyD']) {
        if (state.playerX < canvas.width - 50) {
            state.playerX += speed;
            state.facing = 'right';
            state.isMoving = true;
        }
    }
    if (keys['ArrowLeft'] || keys['KeyA']) {
        if (state.playerX > 10) {
            state.playerX -= speed;
            state.facing = 'left';
            state.isMoving = true;
        }
    }

    if (state.isMoving) state.animFrame++;

    if (keys['KeyE']) {
        keys['KeyE'] = false;
        let nearObj = objects.find(o => Math.abs((o.x + 30) - (state.playerX + 14)) < 45);
        if (nearObj) interact(nearObj);
    }

    document.getElementById('day-val').innerText = state.day;
    document.getElementById('token-val').innerText = state.tokens;
    document.getElementById('credit-val').innerText = state.credits;
    document.getElementById('status-msg').innerText = state.message;
}

function interact(obj) {
    if (obj.type === "game") {
        if (state.tokens >= obj.cost) {
            state.tokens -= obj.cost;
            let win = Math.floor(Math.random() * 50) + 25;
            state.credits += win;
            state.message = `Played ${obj.name}! Earned +${win} Credits!`;
            saveScore();
        } else {
            state.message = "Not enough tokens to play!";
        }
    } else if (obj.type === "shop") {
        if (state.credits >= 100) {
            state.credits -= 100;
            state.day++;
            state.tokens = 1000;
            state.message = `Rented bed from N40M1! Survived to Day ${state.day}!`;
            saveScore();
        } else {
            state.message = "N40M1: 'You need 100 credits if you want to sleep here tonight.'";
        }
    } else if (obj.type === "secret") {
        let code = prompt("SECURITY DOOR PASSCODE:");
        if (code && code.toLowerCase() === "donttrustnaomi") {
            alert("LOG UNLOCKED: 'Naomi trapped everyone in the '95 arcade loop.'");
        } else {
            alert("ACCESS DENIED");
        }
    }
}

function saveScore() {
    if (!db) return;
    db.ref('leaderboard/' + username).set({ credits: state.credits, day: state.day });
}

function loadLeaderboard() {
    if (!db) return;
    db.ref('leaderboard').orderByChild('credits').limitToLast(5).on('value', snap => {
        const list = document.getElementById('leaderboard-list');
        list.innerHTML = '';
        let entries = [];
        snap.forEach(c => entries.push({ name: c.key, ...c.val() }));
        entries.reverse().forEach(e => {
            let li = document.createElement('li');
            li.innerHTML = `<b>${e.name}</b>: ${e.credits}c`;
            list.appendChild(li);
        });
    });
}

function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    drawEnvironment();

    objects.forEach(obj => {
        if (obj.type === "game") {
            drawCabinet(obj);
        } else if (obj.type === "shop") {
            drawNaomiNPC(obj);
        } else if (obj.type === "secret") {
            // Door
            ctx.fillStyle = '#0a0a14'; ctx.fillRect(obj.x, 170, 50, 140);
            ctx.fillStyle = '#ff0000'; ctx.font = '10px Courier New';
            ctx.fillText("LOCKED", obj.x + 5, 160);
        }

        // Interaction Prompt
        if (Math.abs((obj.x + 30) - (state.playerX + 14)) < 45) {
            ctx.fillStyle = '#ffff00';
            ctx.font = 'bold 12px Courier New';
            ctx.fillText('[E] TALK / INTERACT', obj.x - 15, 145);
        }
    });

    drawDetailedPlayer();
}

loadLeaderboard();
function gameLoop() {
    update();
    render();
    requestAnimationFrame(gameLoop);
}
gameLoop();
</script>
</body>
</html>
