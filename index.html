<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCADE SURVIVAL '95 - Online Edition</title>
    <style>
        body {
            background-color: #0d0d11;
            color: #00ffcc;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
            height: 100vh;
            overflow: hidden;
        }
        #game-container {
            position: relative;
            border: 4px solid #ff0055;
            box-shadow: 0 0 25px #ff0055;
        }
        canvas {
            background-color: #050508;
            image-rendering: pixelated;
            display: block;
        }
        /* Retro CRT Scanline Effect */
        #crt-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%);
            background-size: 100% 4px;
            pointer-events: none;
        }
        #ui-overlay {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: rgba(0, 0, 0, 0.9);
            border-top: 2px solid #00ffcc;
            padding: 10px;
            font-size: 13px;
            display: flex;
            justify-content: space-between;
        }
        #leaderboard {
            position: absolute;
            top: 10px; right: 10px;
            background: rgba(10, 10, 15, 0.85);
            border: 1px solid #ff0055;
            padding: 8px;
            font-size: 11px;
            color: #fff;
            max-width: 180px;
        }
    </style>
    <!-- Firebase SDKs for Online Functionality -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body>

<h1 style="color: #ff0055; text-shadow: 2px 2px #00ffcc; margin: 5px 0;">ARCADE SURVIVAL '95</h1>
<p style="margin: 0 0 10px 0; color: #aaa; font-size: 12px;">[A/D] or [Left/Right] Move | [E] Interact</p>

<div id="game-container">
    <canvas id="gameCanvas" width="640" height="360"></canvas>
    <div id="crt-overlay"></div>
    
    <div id="leaderboard">
        <b style="color: #ff0055;">🏆 GLOBAL TOP CREDITS</b>
        <ol id="leaderboard-list" style="margin: 5px 0 0 0; padding-left: 18px;"></ol>
    </div>

    <div id="ui-overlay">
        <div>
            <span>DAY: <b id="day-val">1</b></span> | 
            <span>TOKENS: <b id="token-val">1000</b></span> | 
            <span>CREDITS: <b id="credit-val">0</b></span>
        </div>
        <div id="status-msg" style="color: #ffff00;">Press E near machines to play!</div>
    </div>
</div>

<script>
// --- 1. FIREBASE CONFIGURATION ---
// Replace the keys below with your actual Firebase project configuration credentials
const firebaseConfig = {
    apiKey: "YOUR_API_KEY_HERE",
    authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
    databaseURL: "https://YOUR_PROJECT_ID-default-rtdb.firebaseio.com",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_PROJECT_ID.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId: "YOUR_APP_ID"
};

// Initialize Firebase (Fallback gracefully to local offline mode if not configured)
let db = null;
try {
    firebase.initializeApp(firebaseConfig);
    db = firebase.database();
} catch (e) {
    console.warn("Firebase not configured yet. Running in local/offline mode.");
}

// Player Persistent Identity
let username = localStorage.getItem('arcade_user') || "Player_" + Math.floor(1000 + Math.random() * 9000);
localStorage.setItem('arcade_user', username);

// --- 2. GAME STATE & SETUP ---
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let state = {
    day: 1,
    tokens: 1000,
    credits: 0,
    playerX: 60,
    message: `Welcome, ${username}!`
};

const keys = {};
window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);

// Arcade Cabinet Locations & Secrets
const objects = [
    { name: "Skee-Ball", x: 100, type: "game", cost: 10, binary: "01000100 (D)" },
    { name: "OutRun '92", x: 200, type: "game", cost: 15, binary: "01001111 (O)" },
    { name: "Street Fighter", x: 300, type: "game", cost: 20, binary: "01001110 (N)" },
    { name: "N40M1 Shop", x: 440, type: "shop" },
    { name: "Secret Door", x: 560, type: "secret" }
];

// --- 3. PIXEL GRAPHICS ENGINE ---
function drawRect(x, y, w, h, color) {
    ctx.fillStyle = color;
    ctx.fillRect(Math.floor(x), Math.floor(y), w, h);
}

function render() {
    // Room Background & Floor Grid
    drawRect(0, 0, canvas.width, canvas.height, "#0e0b16");
    drawRect(0, 270, canvas.width, 90, "#1b1429");

    // Neon Wall Decor
    drawRect(0, 40, canvas.width, 3, "#ff0055");
    drawRect(0, 48, canvas.width, 2, "#00ffcc");

    // Draw Interactive Cabinets
    objects.forEach(obj => {
        if (obj.type === "game") {
            drawRect(obj.x, 170, 45, 100, "#252836");
            drawRect(obj.x + 5, 180, 35, 30, "#00ffcc");
            drawRect(obj.x + 10, 220, 25, 15, "#ff0055");
            ctx.fillStyle = "#fff";
            ctx.font = "10px Courier New";
            ctx.fillText(obj.name, obj.x - 5, 160);
        } else if (obj.type === "shop") {
            drawRect(obj.x, 180, 70, 90, "#881144");
            drawRect(obj.x + 20, 130, 30, 50, "#e6e6e6");
            drawRect(obj.x + 23, 140, 24, 10, "#00ff00");
            ctx.fillStyle = "#ff0055";
            ctx.font = "11px Courier New";
            ctx.fillText("N40M1", obj.x + 15, 120);
        } else if (obj.type === "secret") {
            drawRect(obj.x, 160, 50, 110, "#050505");
            drawRect(obj.x + 20, 200, 10, 20, "#ff0000");
            ctx.fillStyle = "#ff0000";
            ctx.font = "10px Courier New";
            ctx.fillText("LOCKED", obj.x + 5, 150);
        }
    });

    // Draw Pixel Avatar
    drawRect(state.playerX, 225, 20, 45, "#00ffcc");
    drawRect(state.playerX + 3, 210, 14, 15, "#ffccaa");
    ctx.fillStyle = "#fff";
    ctx.font = "10px Courier New";
    ctx.fillText(username, state.playerX - 15, 200);

    // Interaction Hint Text
    let nearObj = objects.find(o => Math.abs(o.x - state.playerX) < 35);
    if (nearObj) {
        ctx.fillStyle = "#ffff00";
        ctx.fillText(`[E] ${nearObj.name}`, state.playerX - 10, 185);
    }
}

// --- 4. GAME CONTROLS & DATABASE SYNC ---
function update() {
    if ((keys['ArrowRight'] || keys['KeyD']) && state.playerX < canvas.width - 40) state.playerX += 3;
    if ((keys['ArrowLeft'] || keys['KeyA']) && state.playerX > 10) state.playerX -= 3;

    if (keys['KeyE']) {
        keys['KeyE'] = false;
        let nearObj = objects.find(o => Math.abs(o.x - state.playerX) < 35);
        if (nearObj) interact(nearObj);
    }

    // Dynamic UI Updates
    document.getElementById('day-val').innerText = state.day;
    document.getElementById('token-val').innerText = state.tokens;
    document.getElementById('credit-val').innerText = state.credits;
    document.getElementById('status-msg').innerText = state.message;
}

function interact(obj) {
    if (obj.type === "game") {
        if (state.tokens >= obj.cost) {
            state.tokens -= obj.cost;
            let earned = Math.floor(Math.random() * 60) + 20;
            state.credits += earned;
            state.message = `Won ${earned} Credits! Cabinet Code: ${obj.binary}`;
            saveScoreOnline();
        } else {
            state.message = "Out of tokens for today!";
        }
    } else if (obj.type === "shop") {
        if (state.credits >= 100) {
            state.credits -= 100;
            state.day++;
            state.tokens = 1000;
            state.message = "Rented mattress from N40M1! Survived to Day " + state.day;
            saveScoreOnline();
        } else {
            state.message = "N40M1: 'Need 100 credits for a bed to survive the night.'";
        }
    } else if (obj.type === "secret") {
        let code = prompt("ENTER OVERRIDE PASSWORD:");
        if (code && code.toLowerCase() === "donttrustnaomi") {
            alert("ACCESS GRANTED.\n\n[FFB LOG]: 'Naomi trapped us in the 1995 loop. Collect binary codes from all machines to build the kill-code.'");
        } else {
            alert("ACCESS DENIED.");
        }
    }
}

function saveScoreOnline() {
    if (!db) return;
    db.ref('leaderboard/' + username).set({
        credits: state.credits,
        day: state.day
    });
}

function listenToLeaderboard() {
    if (!db) return;
    db.ref('leaderboard').orderByChild('credits').limitToLast(5).on('value', snapshot => {
        const list = document.getElementById('leaderboard-list');
        list.innerHTML = '';
        let entries = [];
        snapshot.forEach(child => {
            entries.push({ name: child.key, ...child.val() });
        });
        entries.reverse().forEach(entry => {
            let li = document.createElement('li');
            li.innerText = `${entry.name}: ${entry.credits}c (Day ${entry.day})`;
            list.appendChild(li);
        });
    });
}

// Start Main Game Loop
listenToLeaderboard();
function gameLoop() {
    update();
    render();
    requestAnimationFrame(gameLoop);
}
gameLoop();
</script>
</body>
</html>
