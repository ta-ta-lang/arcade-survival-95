<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCADE SURVIVAL '95 - HD Edition</title>
    <style>
        * { box-sizing: border-box; }
        body {
            background-color: #050508;
            color: #00ffcc;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
            height: 100vh;
            overflow: hidden;
        }
        h1 {
            color: #ff0055;
            text-shadow: 0 0 10px #ff0055, 2px 2px #00ffcc;
            margin: 0 0 5px 0;
            letter-spacing: 2px;
            font-size: 24px;
        }
        p.subtitle {
            margin: 0 0 15px 0;
            color: #8a8aab;
            font-size: 13px;
            text-transform: uppercase;
        }
        #game-container {
            position: relative;
            border: 4px solid #ff0055;
            box-shadow: 0 0 30px rgba(255, 0, 85, 0.4);
            border-radius: 4px;
        }
        canvas {
            background-color: #000;
            /* Crisp pixel rendering cross-browser */
            image-rendering: -moz-crisp-edges;
            image-rendering: -webkit-crisp-edges;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            display: block;
        }
        #crt-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 4px;
            pointer-events: none;
        }
        #ui-overlay {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: rgba(10, 10, 18, 0.92);
            border-top: 2px solid #00ffcc;
            padding: 12px 16px;
            font-size: 13px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 -5px 15px rgba(0, 255, 204, 0.1);
        }
        #leaderboard {
            position: absolute;
            top: 15px; right: 15px;
            background: rgba(12, 12, 20, 0.9);
            border: 2px solid #ff0055;
            box-shadow: 0 0 10px rgba(255, 0, 85, 0.3);
            padding: 10px;
            font-size: 11px;
            color: #fff;
            width: 190px;
            border-radius: 4px;
        }
        .stat-val { color: #fff; font-weight: bold; }
    </style>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body>

<h1>ARCADE SURVIVAL '95</h1>
<p class="subtitle">[A / D] Move &nbsp;|&nbsp; [E] Interact &nbsp;|&nbsp; [SHIFT] Run</p>

<div id="game-container">
    <canvas id="gameCanvas" width="800" height="400"></canvas>
    <div id="crt-overlay"></div>
    
    <div id="leaderboard">
        <b style="color: #ff0055; display:block; border-bottom: 1px solid #333; padding-bottom: 4px; margin-bottom: 6px;">🏆 TOP SURVIVORS</b>
        <ol id="leaderboard-list" style="margin: 0; padding-left: 18px; color: #00ffcc;"></ol>
    </div>

    <div id="ui-overlay">
        <div>
            DAY: <span class="stat-val" id="day-val">1</span> &nbsp;|&nbsp; 
            TOKENS: <span class="stat-val" id="token-val" style="color:#00ffcc">1000</span> &nbsp;|&nbsp; 
            CREDITS: <span class="stat-val" id="credit-val" style="color:#ff0055">0</span>
        </div>
        <div id="status-msg" style="color: #ffff00; font-weight: bold;">Explore the arcade floor...</div>
    </div>
</div>

<script>
// --- 1. FIREBASE SETUP ---
const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
    projectId: "YOUR_PROJECT",
    storageBucket: "YOUR_PROJECT.appspot.com",
    messagingSenderId: "SENDER_ID",
    appId: "APP_ID"
};

let db = null;
try {
    firebase.initializeApp(firebaseConfig);
    db = firebase.database();
} catch (e) {
    console.warn("Firebase running in offline mode.");
}

let username = localStorage.getItem('arcade_user') || "Player_" + Math.floor(1000 + Math.random() * 9000);
localStorage.setItem('arcade_user', username);

// --- 2. CANVAS & ENGINE SETUP ---
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

let state = {
    day: 1,
    tokens: 1000,
    credits: 0,
    playerX: 80,
    playerY: 280,
    facing: 'right',
    isMoving: false,
    animFrame: 0,
    message: `Welcome to the Arcade, ${username}!`
};

const keys = {};
window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);

// Arcade Cabinet Locations & Data
const cabinets = [
    { name: "NEO DRIFT '92", x: 120, color: "#ff0055", screenColor: "#0055ff", cost: 10, type: "game" },
    { name: "CYBER SLAM", x: 260, color: "#00ffcc", screenColor: "#ffaa00", cost: 15, type: "game" },
    { name: "SPACE RAID 2000", x: 400, color: "#aa00ff", screenColor: "#00ff55", cost: 20, type: "game" },
    { name: "N40M1'S SHOP", x: 570, color: "#ffaa00", screenColor: "#ff0055", cost: 0, type: "shop" },
    { name: "SECURITY DOOR", x: 710, color: "#222233", screenColor: "#330000", cost: 0, type: "secret" }
];

// --- 3. HIGH-DETAIL ARTWORK DRAWING FUNCTIONS ---

function drawBackground() {
    // Wall Gradient
    let wallGrad = ctx.createLinearGradient(0, 0, 0, 260);
    wallGrad.addColorStop(0, '#0a0a14');
    wallGrad.addColorStop(1, '#181528');
    ctx.fillStyle = wallGrad;
    ctx.fillRect(0, 0, canvas.width, 260);

    // Neon Wall Stripe
    ctx.fillStyle = '#ff0055';
    ctx.fillRect(0, 70, canvas.width, 4);
    ctx.fillStyle = '#00ffcc';
    ctx.fillRect(0, 78, canvas.width, 2);

    // Posters on Wall
    ctx.fillStyle = '#111';
    ctx.fillRect(40, 90, 40, 55);
    ctx.fillStyle = '#ff0055';
    ctx.fillRect(44, 94, 32, 47);
    ctx.fillStyle = '#fff';
    ctx.font = '7px Courier New';
    ctx.fillText('RETRO', 48, 115);

    // Floor Grid with Perspective
    ctx.fillStyle = '#100c1e';
    ctx.fillRect(0, 260, canvas.width, 140);

    // Floor Tile Lines
    ctx.strokeStyle = '#221a3a';
    ctx.lineWidth = 2;
    for (let x = 0; x < canvas.width; x += 40) {
        ctx.beginPath();
        ctx.moveTo(x, 260);
        ctx.lineTo(x, 400);
        ctx.stroke();
    }
    for (let y = 260; y < 400; y += 25) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
        ctx.stroke();
    }

    // Floor Light Reflection Under Cabinets
    cabinets.forEach(cab => {
        let grad = ctx.createRadialGradient(cab.x + 30, 265, 5, cab.x + 30, 265, 45);
        grad.addColorStop(0, cab.color + '44');
        grad.addColorStop(1, 'transparent');
        ctx.fillStyle = grad;
        ctx.fillRect(cab.x - 20, 260, 100, 30);
    });
}

function drawCabinet(cab) {
    const x = cab.x;
    const y = 110;

    // Outer Cabinet Frame
    ctx.fillStyle = '#0d0d15';
    ctx.fillRect(x - 2, y - 2, 64, 154);

    // Main Body
    ctx.fillStyle = cab.color;
    ctx.fillRect(x, y, 60, 150);

    // Side Shading / Bevel
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillRect(x + 52, y, 8, 150);

    // Marquee Header (Glowing)
    ctx.fillStyle = '#111';
    ctx.fillRect(x + 4, y + 6, 52, 22);
    ctx.fillStyle = cab.color;
    ctx.fillRect(x + 6, y + 8, 48, 18);
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 8px Courier New';
    ctx.fillText(cab.name.substring(0, 9), x + 8, y + 20);

    // Screen Frame
    ctx.fillStyle = '#05050a';
    ctx.fillRect(x + 5, y + 34, 50, 45);

    // Screen Display
    ctx.fillStyle = cab.screenColor;
    ctx.fillRect(x + 8, y + 37, 44, 39);

    // CRT Screen Reflection Arc
    ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
    ctx.beginPath();
    ctx.moveTo(x + 8, y + 37);
    ctx.lineTo(x + 35, y + 37);
    ctx.lineTo(x + 8, y + 65);
    ctx.fill();

    // Control Deck
    ctx.fillStyle = '#22222e';
    ctx.fillRect(x + 2, y + 82, 56, 22);
    
    // Joystick
    ctx.fillStyle = '#111';
    ctx.fillRect(x + 12, y + 92, 3, 8);
    ctx.fillStyle = '#ff0000';
    ctx.beginPath();
    ctx.arc(x + 13.5, y + 91, 3, 0, Math.PI * 2);
    ctx.fill();

    // Arcade Buttons
    ctx.fillStyle = '#00ffcc';
    ctx.beginPath(); ctx.arc(x + 28, y + 93, 2.5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#ff0055';
    ctx.beginPath(); ctx.arc(x + 36, y + 93, 2.5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#ffff00';
    ctx.beginPath(); ctx.arc(x + 44, y + 93, 2.5, 0, Math.PI * 2); ctx.fill();

    // Lower Coin Door
    ctx.fillStyle = '#15151f';
    ctx.fillRect(x + 10, y + 108, 40, 38);
    ctx.fillStyle = '#ffaa00'; // Coin slot glow
    ctx.fillRect(x + 18, y + 115, 6, 2);
    ctx.fillRect(x + 36, y + 115, 6, 2);
}

function drawDetailedPlayer() {
    const x = state.playerX;
    const y = state.playerY;
    const bounce = state.isMoving ? Math.sin(state.animFrame * 0.3) * 2 : 0;

    // Shadow
    ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
    ctx.beginPath();
    ctx.ellipse(x + 12, y + 42, 12, 4, 0, 0, Math.PI * 2);
    ctx.fill();

    // Legs / Pants
    ctx.fillStyle = '#1e1e2f';
    ctx.fillRect(x + 4, y + 26 + bounce, 6, 16);
    ctx.fillRect(x + 14, y + 26 + bounce, 6, 16);

    // Shoes
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(x + 2, y + 40 + bounce, 8, 4);
    ctx.fillRect(x + 14, y + 40 + bounce, 8, 4);

    // Jacket Body
    ctx.fillStyle = '#00ffcc';
    ctx.fillRect(x + 3, y + 12 + bounce, 18, 15);
    // Inner Shirt
    ctx.fillStyle = '#ff0055';
    ctx.fillRect(x + 9, y + 12 + bounce, 6, 15);

    // Head / Face
    ctx.fillStyle = '#ffccaa';
    ctx.fillRect(x + 5, y - 2 + bounce, 14, 14);

    // Eyes
    ctx.fillStyle = '#111';
    if (state.facing === 'right') {
        ctx.fillRect(x + 14, y + 2 + bounce, 3, 3);
    } else {
        ctx.fillRect(x + 7, y + 2 + bounce, 3, 3);
    }

    // Hair
    ctx.fillStyle = '#4a2e18';
    ctx.fillRect(x + 4, y - 5 + bounce, 16, 5);
    ctx.fillRect(x + 3, y - 2 + bounce, 3, 6);
}

// --- 4. GAME ENGINE LOOP ---

function update() {
    let speed = keys['ShiftLeft'] || keys['ShiftRight'] ? 4 : 2.2;
    state.isMoving = false;

    if (keys['ArrowRight'] || keys['KeyD']) {
        if (state.playerX < canvas.width - 40) {
            state.playerX += speed;
            state.facing = 'right';
            state.isMoving = true;
        }
    }
    if (keys['ArrowLeft'] || keys['KeyA']) {
        if (state.playerX > 10) {
            state.playerX -= speed;
            state.facing = 'left';
            state.isMoving = true;
        }
    }

    if (state.isMoving) state.animFrame++;

    // Interact Key
    if (keys['KeyE']) {
        keys['KeyE'] = false;
        let nearCab = cabinets.find(c => Math.abs((c.x + 30) - (state.playerX + 12)) < 35);
        if (nearCab) interact(nearCab);
    }

    // Update UI Elements
    document.getElementById('day-val').innerText = state.day;
    document.getElementById('token-val').innerText = state.tokens;
    document.getElementById('credit-val').innerText = state.credits;
    document.getElementById('status-msg').innerText = state.message;
}

function interact(cab) {
    if (cab.type === "game") {
        if (state.tokens >= cab.cost) {
            state.tokens -= cab.cost;
            let win = Math.floor(Math.random() * 50) + 25;
            state.credits += win;
            state.message = `Played ${cab.name}! Earned +${win} Credits!`;
            saveScore();
        } else {
            state.message = "Not enough tokens to play!";
        }
    } else if (cab.type === "shop") {
        if (state.credits >= 100) {
            state.credits -= 100;
            state.day++;
            state.tokens = 1000;
            state.message = `Rented bed from N40M1! Survived to Day ${state.day}!`;
            saveScore();
        } else {
            state.message = "N40M1: 'I need 100 credits if you want to sleep here tonight.'";
        }
    } else if (cab.type === "secret") {
        let code = prompt("ENTER PASSCODE:");
        if (code && code.toLowerCase() === "donttrustnaomi") {
            alert("SECRET UNLOCKED: 'Naomi trapped everyone in the '95 arcade loop.'");
        } else {
            alert("ACCESS DENIED");
        }
    }
}

function saveScore() {
    if (!db) return;
    db.ref('leaderboard/' + username).set({ credits: state.credits, day: state.day });
}

function loadLeaderboard() {
    if (!db) return;
    db.ref('leaderboard').orderByChild('credits').limitToLast(5).on('value', snap => {
        const list = document.getElementById('leaderboard-list');
        list.innerHTML = '';
        let entries = [];
        snap.forEach(c => entries.push({ name: c.key, ...c.val() }));
        entries.reverse().forEach(e => {
            let li = document.createElement('li');
            li.innerHTML = `<b>${e.name}</b>: ${e.credits}c`;
            list.appendChild(li);
        });
    });
}

function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // 1. Draw Environment
    drawBackground();

    // 2. Draw Arcade Cabinets
    cabinets.forEach(cab => {
        drawCabinet(cab);

        // Interaction Prompt Text
        if (Math.abs((cab.x + 30) - (state.playerX + 12)) < 35) {
            ctx.fillStyle = '#ffff00';
            ctx.font = 'bold 11px Courier New';
            ctx.fillText('[E] INTERACT', cab.x + 2, 95);
        }
    });

    // 3. Draw Player
    drawDetailedPlayer();
}

loadLeaderboard();
function gameLoop() {
    update();
    render();
    requestAnimationFrame(gameLoop);
}
gameLoop();
</script>
</body>
</html>
