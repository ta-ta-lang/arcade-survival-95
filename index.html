<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dave & Buster's: Solo Arcade Survival</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="game-container">
    <!-- Header / Stats Bar -->
    <header id="stats-bar">
      <div class="stat"><span class="label">Day:</span> <span id="stat-day">1</span>/365</div>
      <div class="stat"><span class="label">Tokens:</span> <span id="stat-tokens">1000</span></div>
      <div class="stat"><span class="label">Credits:</span> <span id="stat-credits">0</span></div>
      <div class="stat"><span class="label">Time Dialation:</span> <span id="stat-time">Off</span></div>
    </header>

    <!-- Main Narrative Display -->
    <main id="story-window">
      <div id="story-text"></div>
    </main>

    <!-- Interactive Choices Section -->
    <footer id="choices-container">
      <!-- Buttons will be dynamically generated by JS -->
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
