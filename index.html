<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ARCADE TRAP: 2000s Survival</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="game-container">
    <!-- TOP HUD: CLOCK & SURVIVAL STATS -->
    <div id="top-hud">
      <div class="hud-box" id="clock-display">08:00 AM | DAY 1</div>
      
      <div class="hud-stats">
        <div class="stat-container">
          <label>HUNGER</label>
          <div class="bar-bg"><div id="hunger-bar" class="bar-fill hunger"></div></div>
        </div>
        <div class="stat-container">
          <label>ENERGY</label>
          <div class="bar-bg"><div id="energy-bar" class="bar-fill energy"></div></div>
        </div>
        <div class="stat-container">
          <label>HYGIENE</label>
          <div class="bar-bg"><div id="hygiene-bar" class="bar-fill hygiene"></div></div>
        </div>
      </div>
    </div>

    <!-- MAIN CANVAS -->
    <canvas id="gameCanvas"></canvas>

    <!-- HOTBAR HUD (1-9 KEYS) -->
    <div id="hotbar-container">
      <div class="hotbar-slot active" data-slot="0"><span class="slot-num">1</span><canvas class="item-icon" width="24" height="24"></canvas></div>
      <div class="hotbar-slot" data-slot="1"><span class="slot-num">2</span><canvas class="item-icon" width="24" height="24"></canvas></div>
      <div class="hotbar-slot" data-slot="2"><span class="slot-num">3</span><canvas class="item-icon" width="24" height="24"></canvas></div>
      <div class="hotbar-slot" data-slot="3"><span class="slot-num">4</span><canvas class="item-icon" width="24" height="24"></canvas></div>
      <div class="hotbar-slot" data-slot="4"><span class="slot-num">5</span><canvas class="item-icon" width="24" height="24"></canvas></div>
      <div class="hotbar-slot" data-slot="5"><span class="slot-num">6</span><canvas class="item-icon" width="24" height="24"></canvas></div>
      <div class="hotbar-slot" data-slot="6"><span class="slot-num">7</span><canvas class="item-icon" width="24" height="24"></canvas></div>
      <div class="hotbar-slot" data-slot="7"><span class="slot-num">8</span><canvas class="item-icon" width="24" height="24"></canvas></div>
      <div class="hotbar-slot" data-slot="8"><span class="slot-num">9</span><canvas class="item-icon" width="24" height="24"></canvas></div>
    </div>

    <!-- DIZZY OVERLAY -->
    <div id="dizzy-overlay" class="hidden"></div>

    <!-- TERMINAL / DIALOGUE OVERLAY -->
    <div id="dialogue-box" class="hidden">
      <div id="dialogue-name">N40M1</div>
      <div id="dialogue-text">...</div>
      <div id="dialogue-prompt">[PRESS ENTER]</div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
