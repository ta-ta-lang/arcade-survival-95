<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arcade Survival</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="game-container">
    <!-- UI Overlay for Stats & Score -->
    <div id="ui-layer">
      <div class="stat-box">
        <span>HEALTH:</span> <span id="health-val">100</span>
      </div>
      <div class="stat-box">
        <span>SCORE:</span> <span id="score-val">0</span>
      </div>
    </div>

    <!-- Main Game Canvas -->
    <canvas id="gameCanvas"></canvas>

    <!-- Interactive Terminal Modal (Hidden by default) -->
    <div id="terminal-modal" class="hidden">
      <div class="terminal-header">SYSTEM TERMINAL</div>
      <div id="terminal-output">Enter access code...</div>
      <input type="text" id="terminal-input" placeholder="01000011..." autofocus />
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
